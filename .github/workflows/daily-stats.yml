name: Daily Server Stats

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Signaling Stats
        id: signal
        run: |
          RESULT=$(curl -sf -H "x-admin-token: ${{ secrets.GDB_STATS_TOKEN }}" https://signal.glassdesktopbox.com/api/admin/stats)
          ACTIVE=$(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['activeSessions'])")
          TOTAL=$(echo $RESULT  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['totalSessionsCreated'])")
          P2P=$(echo $RESULT    | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['p2pSessionsEstimate'])")
          RELAY=$(echo $RESULT  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['relaySessions'])")
          RBYTES=$(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['relayBytesTotal'])")
          QUOTE=$(echo $RESULT  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['p2pQuotePercent'])")
          UPTIME=$(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['uptimeSeconds'])")
          RMB=$(python3 -c "print(f'{$RBYTES/1048576:.1f} MB')" 2>/dev/null || echo "${RBYTES} B")
          UPTIME_H=$(python3 -c "s=$UPTIME; print(f'{int(s//3600)}h {int((s%3600)//60)}m')")
          echo "active=$ACTIVE"   >> $GITHUB_OUTPUT
          echo "total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "p2p=$P2P"         >> $GITHUB_OUTPUT
          echo "relay=$RELAY"     >> $GITHUB_OUTPUT
          echo "relay_mb=$RMB"    >> $GITHUB_OUTPUT
          echo "quote=$QUOTE"     >> $GITHUB_OUTPUT
          echo "uptime=$UPTIME_H" >> $GITHUB_OUTPUT

      - name: Hetzner Traffic
        id: hetzner
        run: |
          RESULT=$(curl -sf -H "Authorization: Bearer ${{ secrets.HETZNER_API_TOKEN }}" "https://api.hetzner.cloud/v1/servers?per_page=50")
          OUT=$(echo $RESULT | python3 -c "import sys,json; s=json.load(sys.stdin)['servers'][0]; print(s.get('outgoing_traffic',0))")
          INC=$(echo $RESULT | python3 -c "import sys,json; s=json.load(sys.stdin)['servers'][0]; print(s.get('included_traffic',0))")
          IN=$(echo $RESULT  | python3 -c "import sys,json; s=json.load(sys.stdin)['servers'][0]; print(s.get('ingoing_traffic',0))")
          NAME=$(echo $RESULT| python3 -c "import sys,json; s=json.load(sys.stdin)['servers'][0]; print(s['name'])")
          OUT_GB=$(python3 -c "print(f'{$OUT/1073741824:.2f} GB')")
          INC_TB=$(python3 -c "print(f'{$INC/1099511627776:.1f} TB')")
          IN_GB=$(python3  -c "print(f'{$IN/1073741824:.2f} GB')")
          FREE_TB=$(python3 -c "free=max(0,$INC-$OUT); print(f'{free/1099511627776:.2f} TB')")
          echo "name=$NAME"    >> $GITHUB_OUTPUT
          echo "out=$OUT_GB"   >> $GITHUB_OUTPUT
          echo "inc=$INC_TB"   >> $GITHUB_OUTPUT
          echo "in=$IN_GB"     >> $GITHUB_OUTPUT
          echo "free=$FREE_TB" >> $GITHUB_OUTPUT

      - name: E-Mail senden
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: GlassDesktopBox Stats <${{ secrets.MAIL_USERNAME }}>
          subject: "GDB Stats - ${{ steps.signal.outputs.quote }}% P2P - ${{ steps.hetzner.outputs.out }} OUT"
          body: |
            GlassDesktopBox - Taeglich Server Report
            ==========================================

            SIGNALING SERVER
            Aktive Sitzungen : ${{ steps.signal.outputs.active }}
            P2P (direkt)     : ${{ steps.signal.outputs.p2p }} Sitzungen
            Relay            : ${{ steps.signal.outputs.relay }} Sitzungen (${{ steps.signal.outputs.relay_mb }})
            Gesamt erstellt  : ${{ steps.signal.outputs.total }} Sitzungen
            P2P-Quote        : ${{ steps.signal.outputs.quote }}%
            Uptime           : ${{ steps.signal.outputs.uptime }}

            HETZNER SERVER
            Server  : ${{ steps.hetzner.outputs.name }}
            OUT     : ${{ steps.hetzner.outputs.out }} (inkl. ${{ steps.hetzner.outputs.inc }})
            IN      : ${{ steps.hetzner.outputs.in }}
            Frei    : ${{ steps.hetzner.outputs.free }}

            -- Automatisch generiert von GitHub Actions
