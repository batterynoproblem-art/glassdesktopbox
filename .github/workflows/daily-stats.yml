name: Daily Server Stats

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Stats abrufen
        id: stats
        run: |
          SIGNAL=$(curl -sf -H "x-admin-token: ${{ secrets.GDB_STATS_TOKEN }}" \
            https://signal.glassdesktopbox.com/api/admin/stats || echo '{}')
          HETZNER=$(curl -sf -H "Authorization: Bearer ${{ secrets.HETZNER_API_TOKEN }}" \
            "https://api.hetzner.cloud/v1/servers?per_page=50" || echo '{"servers":[{}]}')
          P2P=$(echo $SIGNAL   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('p2pSessionsEstimate',0))")
          RELAY=$(echo $SIGNAL | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('relaySessions',0))")
          QUOTE=$(echo $SIGNAL | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('p2pQuotePercent',0))")
          TOTAL=$(echo $SIGNAL | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('totalSessionsCreated',0))")
          OUT=$(echo $HETZNER  | python3 -c "import sys,json; s=json.load(sys.stdin)['servers'][0]; v=s.get('outgoing_traffic',0); print(f'{v/1073741824:.1f} GB')")
          FREE=$(echo $HETZNER | python3 -c "import sys,json; s=json.load(sys.stdin)['servers'][0]; v=max(0,s.get('included_traffic',0)-s.get('outgoing_traffic',0)); print(f'{v/1099511627776:.1f} TB')")
          echo "p2p=$P2P relay=$RELAY quote=$QUOTE total=$TOTAL out=$OUT free=$FREE"
          echo "SUBJECT=GDB ${QUOTE}% P2P | ${OUT} OUT" >> $GITHUB_ENV
          echo "BODY=P2P: ${P2P} | Relay: ${RELAY} | Quote: ${QUOTE}% | Gesamt: ${TOTAL} | Hetzner OUT: ${OUT} | Frei: ${FREE}" >> $GITHUB_ENV

      - name: E-Mail senden
        run: |
          curl -sf -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"GDB Stats <onboarding@resend.dev>\",\"to\":[\"${{ secrets.MAIL_TO }}\"],\"subject\":\"${{ env.SUBJECT }}\",\"text\":\"${{ env.BODY }}\"}"
